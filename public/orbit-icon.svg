<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#b9bdc1"/>
      <stop offset="0.7" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#6f7478"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="#e8e6df"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#metal)" stroke-width="38"/>
  <circle cx="256" cy="256" r="92" fill="#090909"/>
  <circle cx="256" cy="256" r="56" fill="none" stroke="#bcd8ee" stroke-width="8" filter="url(#glow)"/>
  <circle cx="369" cy="143" r="18" fill="#f8f8f6"/>
</svg>
