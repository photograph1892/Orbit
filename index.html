<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Scroll Orbit</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

        <clipPath id="squircle-small-clip" clipPathUnits="objectBoundingBox">

        </clipPath>
      </defs>
    </svg>
    <main class="viewport" aria-label="Scroll orbit prototype">
      <section class="stage">
        <div class="ambient-backdrop" aria-hidden="true">
          <span class="ambient-layer is-active"></span>
          <span class="ambient-layer"></span>
        </div>

        <nav class="mode-switch" aria-label="Mode switcher">
          <button class="mode-button is-active" type="button" data-mode-target="play">Play</button>
          <button class="mode-button" type="button" data-mode-target="create">Create</button>
          <button class="mode-button" type="button" data-mode-target="edit">Edit</button>
        </nav>

        <div class="orbit-wrap" aria-label="Rotating image orbit">
          <div class="orbit" aria-hidden="true"></div>
          <p class="empty-orbit">record &amp; create your Orbit.</p>
        </div>

        <div class="album-info" aria-live="polite">
          <p class="album-title"></p>
          <p class="album-date"></p>
        </div>

        <img class="brand-logo" src="assets/orbit-logo.png" alt="Orbit" />

        <section class="player-panel" aria-label="Orbit player">
          <p class="now-playing">Not playing</p>
          <div class="transport">
            <button class="player-button" type="button" data-player-action="prev" aria-label="Previous">‹</button>
            <button class="player-button play-toggle" type="button" data-player-action="toggle" aria-label="Play">▶</button>
            <button class="player-button" type="button" data-player-action="next" aria-label="Next">›</button>
          </div>
          <div class="player-time">
            <span class="current-time">0:00</span>
            <input class="player-seek" type="range" min="0" max="30" value="0" step="0.01" aria-label="Playback progress" />
            <span class="duration-time">0:30</span>
          </div>
        </section>

        <section class="mode-panel create-panel" data-panel="create" aria-label="Create orbit item" aria-hidden="true">
          <div class="panel-shell">
            <div class="panel-head">
              <p>Create</p>
              <button class="close-button" type="button" data-mode-target="play" aria-label="Close create">×</button>
            </div>
            <div class="capture-stage">
              <video class="camera-preview" autoplay playsinline muted></video>
              <canvas class="capture-canvas" width="960" height="960" aria-hidden="true"></canvas>
              <div class="captured-preview" aria-label="Captured image"></div>
            </div>
            <div class="capture-actions">
              <button class="glass-button primary" type="button" data-create-action="capture" disabled>Capture Memory</button>
            </div>
            <label class="field">
              <span>Title</span>
              <input class="create-title" type="text" autocomplete="off" required placeholder="Landscape, voice, air..." />
            </label>
            <label class="field">
              <span>Comment</span>
              <textarea class="create-comment" rows="3" placeholder="A short note, optional"></textarea>
            </label>
            <p class="record-status">Camera and ambient audio are waiting.</p>
            <button class="glass-button primary create-submit" type="button" disabled>Create Orbit Item</button>
          </div>
        </section>

        <section class="mode-panel edit-panel" data-panel="edit" aria-label="Edit orbit items" aria-hidden="true">
          <div class="panel-shell wide">
            <div class="panel-head">
              <p>Edit</p>
              <div class="panel-actions">
                <button class="quiet-button" type="button" data-mode-target="create">+ Add</button>
                <button class="close-button" type="button" data-mode-target="play" aria-label="Close edit">×</button>
              </div>
            </div>
            <div class="edit-list" aria-live="polite"></div>
          </div>
        </section>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
